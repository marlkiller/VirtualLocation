name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: ./build_app.sh u2b

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "VirtualLocation" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            --no-internet-enable \
            "VirtualLocation-${{ github.ref_name }}.dmg" \
            "VirtualLocation.app"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: VirtualLocation-${{ github.ref_name }}.dmg
          generate_release_notes: true
